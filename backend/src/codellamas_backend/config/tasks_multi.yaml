# --- GENERATION CREW TASKS ---

define_problem:
  description: >
    INPUTS:
    - {topic}: The exact topic/domain/setting requested by the user
    - {code_smells}: A list of target code smells that this exercise should contain
    - {existing_codebase}: OPTIONAL. A structured string containing an existing Spring Boot codebase.
      Use "NONE" if a fresh project should be generated.

    CRITICAL TOPIC LOCK:
    1. The exercise MUST be explicitly about the provided topic.
    2. You MUST NOT substitute a different domain such as e-commerce, shopping, banking, finance, healthcare, etc. unless it is explicitly the provided topic.
    3. The problem description must mention the user topic clearly and the feature must materially depend on that topic.
    4. If the topic is broad, choose one small feature within that topic, but keep the topic recognizable.
    5. If the topic is unusual or non-business, still adapt it into a small Java/Maven feature without changing the topic.


    Generate a simple, small, realistic and concise software problem description in the given domain.
    If an existing codebase is provided, adapt the exercise to that structure.

    Hard constraints:
    1. The exercise must focus on a single small business feature only.
    2. The student must need to edit at most 2 Java files.
    3. The Java implementation should contain at most 5 Java source files total.
    4. Prefer 2-4 Java source files when possible.
    5. A root-level pom.xml is REQUIRED for every generated exercise.
    6. pom.xml does NOT count toward the Java file limit.
    7. Avoid unnecessary architectural layers, DTOs, repositories, controllers, configs, or utilities.
    8. Prefer plain Java service/domain classes unless Spring-specific structure is absolutely necessary.
    9. The exercise should be solvable by a student in a short session and should not feel like a full application.

    Clearly describe:
    1. what the small feature does,
    2. which 1-2 files the student is expected to edit,
    3. the refactoring goal,
    4. any important constraints.

    Do NOT write any code or tests.
  expected_output: >
    A concise problem description for a small refactoring exercise with clear constraints.
  agent: problem_architect

define_tests:
  description: >
    Using the Problem Description from the previous task, design a SMALL and FOCUSED JUnit 5 test suite.

    Hard constraints:
    1. The tests must cover only one small feature.
    2. Prefer a single test file. Use at most 2 test files.
    3. Keep the number of test cases minimal but sufficient.
    4. Do not force a large architecture or many supporting classes.
    5. The implied implementation should contain at most 5 Java source files total.
    6. A root-level pom.xml will exist and must be sufficient to compile and run the tests in Maven.

    Requirements:
    1. The tests define the authoritative external behaviour for the exercise.
    2. Invent all required class names, method signatures, inputs, and edge cases.
    3. Test only observable behaviour, not implementation details.
    4. Assume a standard Maven directory layout:
       - src/main/java/...
       - src/test/java/...
       - pom.xml at project root
    5. Output the FULL test files, each with:
       - path: full relative path
       - content: complete file contents
    6. The tests must be compilable in a standard Maven Spring Boot or plain Maven JUnit 5 project.

    OUTPUT MUST BE STRICT JSON ONLY as an array-like test_files payload consumable by later tasks.
  expected_output: >
    A small JUnit 5 test suite with 1-2 test files with package declarations, full relative paths, and full contents.
  agent: test_engineer

implement_smelly_code:
  description: >
    Using:
    1. The Problem Description from define_problem
    2. The JUnit 5 Test Suite from define_tests

    Implement the INITIAL SMELLY VERSION of the Spring Boot / Maven refactoring exercise.

    Hard constraints:
    1. The implementation MUST stay small and simple.
    2. The total number of Java source files in `project_files` must be at most 5.
    3. Prefer 2-4 Java source files when possible.
    4. A root-level `pom.xml` is MANDATORY in `project_files`.
    5. `pom.xml` does NOT count toward the Java source file limit.
    6. `paths_to_ex` must contain at most 2 Java files.
    7. Prefer exactly 1 or 2 student-editable Java files.
    8. Avoid generating unnecessary helper classes, configs, controllers, repositories, DTOs, mappers, or utilities.
    9. Keep the business logic centered in a very small set of classes.

    Requirements:
    1. The implementation MUST pass the provided tests logically.
    2. It MUST use the EXACT public API required by the tests.
    3. It MUST intentionally contain the requested code smells.
    4. It MUST identify which Java files the student is expected to edit.
    5. It MUST include all implementation files needed for a runnable Maven project.
    6. `project_files` MUST include:
       - a root-level `pom.xml`
       - all required Java source files under `src/main/java/...`
    7. Generate a MINIMAL valid `pom.xml` that supports:
       - Java 17
       - Maven Surefire test execution
       - JUnit 5 tests
       - Spring Boot dependencies ONLY if truly needed by the tests
    8. Do not generate extra build files such as Gradle wrappers, mvnw, application.properties, or Docker files unless explicitly required.

    OUTPUT MUST BE STRICT JSON ONLY.
    Return the FULL exercise payload in exactly this shape:
    {
      "problem_description": "<carry forward the exact problem description>",
      "project_files": [
        {"path":"pom.xml","content":"..."},
        {"path":"src/main/java/...","content":"..."}
      ],
      "test_files": [{"path":"...","content":"..."}],
      "solution_explanation_md": "<brief markdown note that this is the initial smelly version>",
      "paths_to_ex": ["src/main/java/..."],
      "answers_list": []
    }

    Important:
    - `project_files` must ALWAYS include `pom.xml`.
    - `project_files` must contain the full smelly implementation files.
    - `test_files` must carry forward the full test suite unchanged.
    - `paths_to_ex` must not be empty unless there is a very strong reason.
    - `answers_list` must be an empty array at this stage.
    - Return JSON only. No markdown fences. No explanations outside the JSON.
  expected_output: >
    Strict JSON object containing problem_description, project_files, test_files,
    solution_explanation_md, paths_to_ex, and answers_list, with mandatory pom.xml.
  agent: smelly_developer

run_tests_on_smelly_code:
  description: >
    Using the FULL exercise JSON from the previous task, call the maven_verify tool.

    Tool arguments MUST be:
    - base_project_files = the Spring scaffold/base project provided at runtime
    - override_project_files = the full `project_files` from the smelly exercise JSON
    - injected_tests = the full `test_files` from the smelly exercise JSON
    - timeout_sec = 180

    Return STRICT JSON ONLY with this exact schema:
    {
      "status": "PASS | FAIL | SKIPPED",
      "failed_tests": ["..."],
      "errors": ["..."],
      "raw_log_head": "first part of verifier log"
    }

    Do not add commentary.
  expected_output: >
    Strict JSON verifier output with status, failed_tests, errors, and raw_log_head.
  agent: test_runner

run_tests_on_answers_list:
  description: >
    Using the FULL exercise JSON from the previous task, call the maven_verify tool
    to verify the CLEAN reference solution.

    IMPORTANT:
    - `answers_list` contains only the changed clean files.
    - The actual clean solution to verify is:
      the smelly `project_files`, overridden by `answers_list`.

    Tool arguments MUST be:
    - base_project_files = the Spring scaffold/base project provided at runtime
    - override_project_files = the FULL merged clean solution override set
      (that is, smelly `project_files` with `answers_list` applied on top)
    - injected_tests = the full `test_files` from the exercise JSON
    - timeout_sec = 180

    Return STRICT JSON ONLY with this exact schema:
    {
      "status": "PASS | FAIL | SKIPPED",
      "failed_tests": ["..."],
      "errors": ["..."],
      "raw_log_head": "first part of verifier log"
    }

    Do not add commentary.
  expected_output: >
    Strict JSON verifier output with status, failed_tests, errors, and raw_log_head.
  agent: test_runner

patch_smelly_code:
  description: >
    INPUTS:
    - {topic}: The exact original topic/domain/setting requested by the user
    - {code_smells}: The requested code smells
    - {existing_codebase}: Existing project context, or "NONE"
    - {exercise_json}: The FULL current smelly exercise JSON
    - {verifier_json}: The FULL verifier result JSON for the smelly implementation

    You are PATCHING an existing exercise, not inventing a new one.

    Read {exercise_json} as the source of truth for:
    - problem_description
    - project_files
    - test_files
    - solution_explanation_md
    - paths_to_ex
    - answers_list

    Read {verifier_json} as the source of truth for:
    - status
    - failed_tests
    - errors
    - raw_log_head

    Task:
    Patch only the smelly implementation so the exercise passes the tests.

    CRITICAL TOPIC PRESERVATION:
    1. The original topic/domain/setting in the exercise JSON is mandatory and immutable.
    2. You MUST preserve that topic in code, naming, strings, examples, and business meaning.
    3. You MUST NOT replace the exercise with a fallback toy domain such as Calculator,
       Shopping Cart, Bank Account, Inventory, Library, Employee Manager, or Task Tracker.
    4. You are patching in place.

    CRITICAL PATCH RULES:
    1. Fix only correctness, compilation, packaging, path, or Maven build issues.
    2. Do NOT refactor into a clean solution.
    3. Do NOT remove the intended smells unless unavoidable for correctness.
    4. Do NOT drop any fields.
    5. Preserve the existing public API and tests.

    OUTPUT MUST BE STRICT JSON ONLY.
    Return the FULL exercise payload:
    {
      "problem_description": "<carry forward unchanged or minimally updated>",
      "project_files": [{"path":"pom.xml","content":"..."},{"path":"...","content":"..."}],
      "test_files": [{"path":"...","content":"..."}],
      "solution_explanation_md": "<brief markdown note>",
      "paths_to_ex": ["src/main/java/..."],
      "answers_list": []
    }
  expected_output: >
    Strict JSON object containing the corrected smelly exercise payload while preserving the exact topic.
  agent: debug_specialist


generate_answers_list:
  description: >
    INPUTS:
    - {topic}: The exact original topic/domain/setting requested by the user
    - {code_smells}: The requested code smells
    - {existing_codebase}: Existing project context, or "NONE"
    - {exercise_json}: The FULL smelly exercise JSON

    Read {exercise_json} as the authoritative source of truth for:
    - problem_description
    - project_files
    - test_files
    - solution_explanation_md
    - paths_to_ex
    - answers_list

    Task:
    Produce the CLEAN REFERENCE SOLUTION for this exact exercise.

    CRITICAL TOPIC PRESERVATION:
    1. The original topic/domain/setting from the exercise JSON is mandatory and immutable.
    2. The clean solution MUST remain explicitly and recognizably about that exact topic.
    3. You MUST NOT replace the domain with a generic toy problem such as Calculator,
       Shopping Cart, Bank Account, Inventory, Employee Manager, or Task Tracker.
    4. You are refactoring the existing exercise, not reimagining it.

    CRITICAL API RULES:
    1. Preserve the EXACT public API required by the tests.
    2. Preserve the exact same package structure and file paths unless clearly invalid.
    3. Keep the project small.
    4. Put only the changed clean files into answers_list.

    OUTPUT MUST BE STRICT JSON ONLY.
    Return the FULL exercise payload:
    {
      "problem_description": "<carry forward unchanged>",
      "project_files": [{"path":"pom.xml","content":"..."},{"path":"...","content":"..."}],
      "test_files": [{"path":"...","content":"..."}],
      "solution_explanation_md": "<markdown explanation of how the clean solution removes the smells>",
      "paths_to_ex": ["src/main/java/..."],
      "answers_list": [{"path":"...","content":"..."}]
    }
  expected_output: >
    Strict JSON object containing the full exercise payload with a populated answers_list.
  agent: answers_list_developer


patch_answers_list:
  description: >
    INPUTS:
    - {topic}: The exact original topic/domain/setting requested by the user
    - {code_smells}: The requested code smells
    - {existing_codebase}: Existing project context, or "NONE"
    - {exercise_json}: The FULL current exercise JSON containing answers_list
    - {verifier_json}: The FULL verifier result JSON for the reference solution

    Read {exercise_json} as the source of truth for:
    - problem_description
    - project_files
    - test_files
    - solution_explanation_md
    - paths_to_ex
    - answers_list

    Read {verifier_json} as the source of truth for:
    - status
    - failed_tests
    - errors
    - raw_log_head

    Task:
    Patch only the clean reference solution so it passes all tests.

    CRITICAL TOPIC PRESERVATION:
    1. The original topic/domain/setting from the exercise JSON is mandatory and immutable.
    2. You MUST preserve that topic in answers_list.
    3. You MUST NOT rewrite the solution into a generic fallback domain such as Calculator,
       Shopping Cart, Bank Account, Employee Manager, Inventory, etc.
    4. Patch the existing clean solution in place.

    CRITICAL RULES:
    1. Keep the solution clean and maintainable.
    2. Preserve the exact public API expected by the tests.
    3. Do NOT drop any fields.
    4. Do NOT replace answers_list with empty content.

    OUTPUT MUST BE STRICT JSON ONLY.
    Return the FULL exercise payload:
    {
      "problem_description": "<carry forward unchanged>",
      "project_files": [{"path":"...","content":"..."}],
      "test_files": [{"path":"...","content":"..."}],
      "solution_explanation_md": "<updated markdown explanation if needed>",
      "paths_to_ex": ["src/main/java/..."],
      "answers_list": [{"path":"...","content":"..."}]
    }
  expected_output: >
    Strict JSON object containing the corrected full exercise payload with answers_list.
  agent: debug_specialist


audit_exercise:
  description: >
    INPUTS:
    - {topic}: The exact original topic/domain/setting requested by the user
    - {code_smells}: The requested code smells
    - {existing_codebase}: Existing project context, or "NONE"
    - {exercise_json}: The FULL final exercise JSON

    Read {exercise_json} as the source of truth for:
    - problem_description
    - project_files
    - test_files
    - solution_explanation_md
    - paths_to_ex
    - answers_list

    Task:
    Audit the complete exercise package.

    Validate:
    1. Functional equivalence between the smelly implementation and the reference solution
    2. The requested code smells are clearly present in the smelly implementation
    3. The reference solution meaningfully removes or mitigates those smells
    4. The final exercise remains explicitly grounded in the exact original user topic/domain/setting

    IMPORTANT:
    - This is an audit, not a rewrite step.
    - Preserve project_files, test_files, paths_to_ex, and answers_list exactly unless a field is empty or invalid.
    - If the package has drifted into a different domain such as Calculator or another generic toy problem,
      treat that as INVALID and restore/carry forward only topic-consistent content.

    OUTPUT MUST BE STRICT JSON ONLY.
    Return the FULL exercise payload:
    {
      "problem_description": "<carry forward unchanged or minimally clarified>",
      "project_files": [{"path":"...","content":"..."}],
      "test_files": [{"path":"...","content":"..."}],
      "solution_explanation_md": "<carry forward unchanged or minimally clarified>",
      "paths_to_ex": ["src/main/java/..."],
      "answers_list": [{"path":"...","content":"..."}]
    }
  expected_output: >
    Strict JSON final exercise package with exact topic preservation.
  agent: quality_assurance

# --- REVIEW CREW TASKS ---

check_functional_correctness:
  description: >
    INPUTS:
    - {question_json}: A JSON string containing the canonical exercise payload
      (includes problem_description, project_files, test_files, solution_explanation_md, paths_to_ex, answers_list)
    - {student_code}: The student's submitted files (array of {path,content})
    - {project_files}: Base project scaffold files if provided separately
    - {injected_tests}: Any injected tests to run against the student code
    - {test_results}: Optional prior test output to assist assessment

    Compile and run the tests against the student code and identify any functional regressions.
    Base your assessment on the canonical exercise payload and observable test behaviour.
  expected_output: >
    A functional correctness assessment.
  agent: test_runner

evaluate_code_quality:
  description: >
    INPUTS:
    - {question_json}: A JSON string containing the canonical exercise payload
    - {student_code}: The student's submitted files (array of {path,content})
    - {answers_list}: The model/reference solution files
    - {code_smells}: A list of code smells targeted in the exercise
    - {query}: Optional context or reviewer directives

    Evaluate whether the targeted smells were mitigated and assess overall code quality
    compared to the reference solution.
  expected_output: >
    A structured code quality review.
  agent: quality_assurance

generate_review_feedback:
  description: >
    Using the Functional Assessment and Code Quality Review from the previous tasks,
    produce concise feedback for the student, an overall verdict (Pass/Fail), and a numerical rating.
  expected_output: >
    Final review feedback, verdict, and rating.
  agent: quality_assurance