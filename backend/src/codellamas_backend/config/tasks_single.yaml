generate_exercise:
  description: >
    INPUTS:
    - {topic}: The topic for the Spring Boot project 
    - {code_smells}: A list of code smells should be tested for this exercise 


    SECTION 1: PROJECT AND EXERCISE GENERATION
    1. 
      a. Generate a small Java Spring Boot project based on {topic} topic for a refactoring exercise. The files should contain common {code_smells} code smells for the university student to identify and practice refactoring on. Students should be expected to edit only 1 java ecercise file.
      b. Include necessary project files for springboot maven build (e.g., pom.xml).
      c. Maximum 4 classes, 1 controller, 1 service, no external APIs or databases.

    2. **Exercise Definition:**
       - Clearly state:
          - The refactoring task, files they are supposed to modify
          - Any Constraints


    SECTION 2: TEST CASE GENERATION
    Generate simple JUnit test cases that define the correct behavior.
    Tests should Pass with the original implementation (with the code smell) and also  after correct refactoring
    Include:
       - One or more normal case
       - One or more edge or invalid input case.
    Package them accordingly

    SECTION 3: REFERENCE SOLUTION GENERATION
    1. Provide a recommended refactored solution that shows correct coding practices withou {code_smells} smells.
    2. Show:
       - The original (smelly) implementation (only the files/segments that contain the smell)
       - Then Only the refactored implementation. Don't show any segments of code that remain unchanged.
    4. Ensure all provided tests pass.

    OUTPUT FORMAT:
    1. problem_description:  Short description. Java file student need to edit. Short definition of each each code smell. That's it no other clues Format should be in markdown (only for problem_description)
    2. project_files: (with code smell) - This will be the full set of files for a new project. without comments (including pom.xml)
    3. test_files: JUnit 5 test cases
    4. solution_explanation_md: on how to solve the exercise in markdown 
    5. paths_to_ex: List of exercise file paths that sudent has to edit 
    6. answers_list: List of answer files (solved exercises in java format)
  expected_output: >
    A structured JSON object In the below format
    {
      "problem_description": "",
      "project_files": [
        {
          "path": "",
          "content": ""
        }
      ],
      "test_files": [
        {
          "path": "",
          "content": ""
        }
      ],
      "solution_explanation_md": "",
      "paths_to_ex": [],
      "answers_list": [  
        {
          "path": "<just file name no parent directory>",
          "content": ""
        }
      ]
    }

  agent: general_agent

review_solution:
  description: >
    You are reviewing a java springboot exercise. First read and understand the original exercise then
    compare student's submitted code with the actual solution. Give the student feedback on how he did 
    - Answer: {query}
    Context:
    - Original exercise and solution files: {question_json}
    - The student's submitted files: {student_code}
    - The code smells that were tested for the task (list): {code_smells}:
    - {test_results}

     OUTPUT FORMAT:
     1. How did the student do in this exercise
     3. Hints on how the student can do better if any. Without revealing too much
     5. A rating of the solution out of 5
       0 - did not change the code at all
       5 - solution matches intention of the answer files
      Include headers and output in markdown format
  expected_output: >
    Review of how the student did in the exercise in markdown format with headers
  agent: general_agent
