name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest src/codellamas_backend -m "not integration" --cov=codellamas_backend --cov-report=term-missing --cov-fail-under=80

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests  # ← only runs if unit tests pass
    steps:
      - uses: actions/checkout@v6

      - name: Set up Java and Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov

      - name: Run integration tests
        run: |
          cd backend/src
          python -m pytest codellamas_backend/test/integration_test -m integration -v